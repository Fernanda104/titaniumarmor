databaseChangeLog:

  - changeSet:
      id: 1
      author: titanium

      changes:

        - createTable:
            tableName: usuarios

            columns:

              - column:
                  name: id
                  type: BIGINT
                  autoIncrement: true

                  constraints:
                    primaryKey: true
                    nullable: false

              - column:
                  name: nombre
                  type: VARCHAR(100)

                  constraints:
                    nullable: false

              - column:
                  name: email
                  type: VARCHAR(100)

                  constraints:
                    nullable: false
                    unique: true

              - column:
                  name: password
                  type: VARCHAR(100)

                  constraints:
                    nullable: false

              - column:
                  name: direccion
                  type: VARCHAR(255)

                  constraints:
                    nullable: false