databaseChangeLog:
  - changeSet:
      id: 001
      author: fernanda

      changes:
        - createTable:
            tableName: tickets_soporte

            columns:

              - column:
                  name: id
                  type: BIGINT
                  autoIncrement: true
                  constraints:
                    primaryKey: true

              - column:
                  name: usuario_id
                  type: BIGINT

              - column:
                  name: asunto
                  type: VARCHAR(200)

              - column:
                  name: descripcion
                  type: VARCHAR(500)

              - column:
                  name: estado
                  type: VARCHAR(50)

              - column:
                  name: fecha_creacion
                  type: DATETIME