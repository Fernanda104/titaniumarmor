spring.application.name=inventario-service

spring.profiles.active=dev

server.port=9093

spring.datasource.url=jdbc:mysql://host.docker.internal:3306/inventario_db?createDatabaseIfNotExist=true
spring.datasource.username=root
spring.datasource.password=

spring.jpa.hibernate.ddl-auto=none
spring.jpa.show-sql=true

spring.liquibase.change-log=classpath:/db/changelog/db.changelog-master.yaml

springdoc.api-docs.enabled=true
springdoc.swagger-ui.enabled=true
springdoc.swagger-ui.path=/doc/swagger-ui.html

##api.catalogo.exists=http://localhost:9092/productos/%d/exists

api.base-url=http://api-gateway:9090
api.catalogo.exists=/productos/%d/exists