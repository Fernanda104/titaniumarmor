spring.application.name=ventas-service

spring.profiles.active=dev

server.port=9094

spring.datasource.url=jdbc:mysql://host.docker.internal:3306/ventas_db?createDatabaseIfNotExist=true
spring.datasource.username=root
spring.datasource.password=

spring.jpa.hibernate.ddl-auto=none
spring.jpa.show-sql=true


logging.file.name=logs/ventas-service.log

spring.liquibase.change-log=classpath:/db/changelog/db.changelog-master.yaml

springdoc.api-docs.enabled=true
springdoc.swagger-ui.enabled=true
springdoc.swagger-ui.path=/doc/swagger-ui.html

api.base-url=http://api-gateway:9090

api.usuario.exists=/usuarios/%d/exists
api.catalogo.exists=/productos/%d/exists
api.inventario.disponible=/inventarios/producto/%d/disponible
api.inventario.descontar=/inventarios/producto/%d/descontar
api.usuario.email=/usuarios/email?email=%s

